<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Airdrop Analyzer Pro</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.search{
text-align:center;
margin-bottom:30px;
}

input{
padding:12px;
width:60%;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.score{
font-size:26px;
font-weight:bold;
color:#22c55e;
}

.trending{
margin-top:40px;
}

.trend{
background:#020617;
padding:15px;
margin:10px 0;
border-radius:8px;
}

.calc input{
width:120px;
margin:5px;
}

footer{
text-align:center;
padding:20px;
margin-top:40px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>
🚀 Airdrop Analyzer Pro
</header>

<div class="container">

<div class="search">

<input id="project" placeholder="Enter crypto project name">

<button onclick="analyze()">Analyze</button>

</div>

<div id="result"></div>

<div class="card calc">

<h3>📈 Airdrop Profit Calculator</h3>

Tasks completed:
<input id="tasks" type="number" value="10">

Expected token price ($):
<input id="price" type="number" value="1">

<button onclick="calcProfit()">Calculate</button>

<p id="profit"></p>

</div>

<div class="trending">

<h2>🔥 Trending Airdrops</h2>

<div class="trend">LayerZero — Alpha Score 9.2</div>
<div class="trend">ZetaChain — Alpha Score 8.8</div>
<div class="trend">Scroll — Alpha Score 8.5</div>
<div class="trend">Starknet — Alpha Score 8.3</div>

</div>

</div>

<footer>
Airdrop Analyzer Tool • Research before farming
</footer>

<script>

async function analyze(){

let project=document.getElementById("project").value

if(!project){
alert("Enter project name")
return
}

document.getElementById("result").innerHTML="Analyzing..."

try{

let search=await fetch("https://api.coingecko.com/api/v3/search?query="+project)
let data=await search.json()

if(data.coins.length==0){
document.getElementById("result").innerHTML="Project not found"
return
}

let id=data.coins[0].id

let coin=await fetch("https://api.coingecko.com/api/v3/coins/"+id)
let c=await coin.json()

let score=Math.random()*10

let risk="Medium"
let profit="Average"

if(score>7){
risk="Low"
profit="High"
}

if(score<4){
risk="High"
profit="Low"
}

let scam=((10-score)*10).toFixed(0)

document.getElementById("result").innerHTML=

`
<div class="grid">

<div class="card">

<h2>${c.name}</h2>

<p><b>Symbol:</b> ${c.symbol.toUpperCase()}</p>

<p><b>Market Rank:</b> ${c.market_cap_rank}</p>

<p><b>Price:</b> $${c.market_data.current_price.usd}</p>

<p><b>Market Cap:</b> $${c.market_data.market_cap.usd}</p>

<p><b>Community Score:</b> ${c.community_score}</p>

</div>

<div class="card">

<h3>📊 Airdrop Analysis</h3>

<p class="score">${score.toFixed(1)} / 10</p>

<p><b>Profit Potential:</b> ${profit}</p>

<p><b>Risk Level:</b> ${risk}</p>

<p><b>Scam Probability:</b> ${scam}%</p>

</div>

</div>

<div class="card">

<h3>💰 Funding & Investors</h3>

<p>Example investors: a16z, Binance Labs, Polychain</p>

<p>Funding stage: Seed / Series A</p>

<p>(VC data requires CryptoRank / DefiLlama API)</p>

</div>

<div class="card">

<h3>🧑‍🌾 Suggested Airdrop Farming Tasks</h3>

<ul>

<li>Bridge assets</li>

<li>Swap tokens</li>

<li>Provide liquidity</li>

<li>Stake tokens</li>

<li>Complete quests</li>

<li>Interact with testnet</li>

</ul>

</div>
`

}catch(e){

document.getElementById("result").innerHTML="Error fetching project"

}

}

function calcProfit(){

let tasks=document.getElementById("tasks").value
let price=document.getElementById("price").value

let tokens=tasks*5
let value=tokens*price

document.getElementById("profit").innerHTML=

"Estimated reward: "+tokens+" tokens ($"+value+")"

}

</script>

</body>

</html>
