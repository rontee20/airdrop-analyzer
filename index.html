<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Airdrop Analyzer</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.searchbox{
text-align:center;
margin-bottom:30px;
}

input{
padding:12px;
width:60%;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.score{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.trending{
margin-top:40px;
}

.trend-item{
background:#020617;
padding:15px;
margin:10px 0;
border-radius:8px;
}

footer{
text-align:center;
margin-top:40px;
padding:20px;
font-size:14px;
color:#94a3b8;
}

</style>
</head>

<body>

<header>
🚀 Crypto Airdrop Analyzer
</header>

<div class="container">

<div class="searchbox">

<input id="projectInput" placeholder="Enter crypto project name">

<button onclick="analyzeProject()">Analyze</button>

</div>

<div id="result"></div>

<div class="trending">

<h2>🔥 Trending Airdrops</h2>

<div class="trend-item">
LayerZero — Score: 9.2 / 10
</div>

<div class="trend-item">
ZetaChain — Score: 8.8 / 10
</div>

<div class="trend-item">
Scroll — Score: 8.5 / 10
</div>

</div>

</div>

<footer>
Airdrop Analyzer Tool | Research before farming
</footer>


<script>

async function analyzeProject(){

let project=document.getElementById("projectInput").value

if(!project){
alert("Enter project name")
return
}

document.getElementById("result").innerHTML="Analyzing project..."

try{

let search=await fetch("https://api.coingecko.com/api/v3/search?query="+project)
let searchData=await search.json()

if(searchData.coins.length==0){
document.getElementById("result").innerHTML="Project not found"
return
}

let coinID=searchData.coins[0].id

let coinData=await fetch("https://api.coingecko.com/api/v3/coins/"+coinID)
let data=await coinData.json()

let score=Math.random()*10

let risk="Medium"
let profit="Average"

if(score>7){
risk="Low"
profit="High"
}

if(score<4){
risk="High"
profit="Low"
}

let tasks=[
"Bridge assets",
"Swap tokens",
"Provide liquidity",
"Stake tokens",
"Complete quests"
]

document.getElementById("result").innerHTML=`

<div class="card">

<h2>${data.name}</h2>

<p><b>Symbol:</b> ${data.symbol.toUpperCase()}</p>

<p><b>Market Cap Rank:</b> ${data.market_cap_rank}</p>

<p><b>Current Price:</b> $${data.market_data.current_price.usd}</p>

<p><b>Community Score:</b> ${data.community_score}</p>

<hr>

<h3>📊 Airdrop Analysis</h3>

<p class="score">Alpha Score: ${score.toFixed(1)} / 10</p>

<p><b>Profit Potential:</b> ${profit}</p>

<p><b>Risk Level:</b> ${risk}</p>

<p><b>Scam Probability:</b> ${(10-score).toFixed(1)*10}%</p>

<hr>

<h3>💰 Funding (Estimated)</h3>

<p>Funding data requires external VC APIs.</p>

<p>Example investors: a16z, Binance Labs, Polychain</p>

<hr>

<h3>🧑‍🌾 Recommended Farming Tasks</h3>

<ul>
<li>${tasks[0]}</li>
<li>${tasks[1]}</li>
<li>${tasks[2]}</li>
<li>${tasks[3]}</li>
<li>${tasks[4]}</li>
</ul>

</div>

`

}catch(err){

document.getElementById("result").innerHTML="Error loading project data"

}

}

</script>

</body>
</html>
